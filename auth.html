<!DOCTYPE html>
<html>
<head>
  <title>Login - InstaRocket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .card { 
      background: white; 
      padding: 2rem; 
      border-radius: 16px; 
      width: 100%; 
      max-width: 400px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
    }
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border: 2px solid #eee; 
      border-radius: 8px; 
      font-size: 16px; 
    }
    button { 
      width: 100%; 
      padding: 14px; 
      background: #4F46E5; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      cursor: pointer; 
      margin: 8px 0; 
    }
    button:hover { background: #3730a3; }
    .toggle { text-align: center; margin-top: 1rem; }
    .status { padding: 10px; margin: 10px 0; border-radius: 8px; }
    .success { background: #10B981; color: white; }
    .error { background: #EF4444; color: white; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🚀 InstaRocket</h2>
    
    <div id="status"></div>
    
    <input type="email" id="email" placeholder="test@example.com" value="test@example.com">
    <input type="password" id="password" placeholder="password123" value="password123">
    
    <button onclick="login()">Login</button>
    <button onclick="register()">Register New Account</button>
    
    <div class="toggle">
      <a href="#" onclick="toggleMode()">Switch to Register</a>
    </div>
  </div>

  <script>
    let isLogin = true;
    
    async function showStatus(msg, isError = false) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = 'status ' + (isError ? 'error' : 'success');
    }
    
    async function login() {
      showStatus('Logging in...');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.success || data.token) {
          localStorage.setItem('token', data.token);
          showStatus('✅ Login Success! Redirecting...');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          showStatus('❌ ' + (data.error || 'Login failed'), true);
        }
      } catch (e) {
        showStatus('❌ Server not running? Check terminal!', true);
      }
    }
    
    async function register() {
      showStatus('Creating account...');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = email.split('@')[0];
      
      try {
        const res = await fetch('http://localhost:3000/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });
        
        const data = await res.json();
        
        if (data.success || data.token) {
          localStorage.setItem('token', data.token);
          showStatus('✅ Account created! Logging in...');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          showStatus('❌ ' + (data.error || 'Registration failed'), true);
        }
      } catch (e) {
        showStatus('❌ Network error', true);
      }
    }
    
    function toggleMode() {
      isLogin = !isLogin;
      document.querySelectorAll('button')[0].textContent = isLogin ? 'Login' : 'Create Account';
      document.querySelectorAll('button')[1].style.display = isLogin ? 'block' : 'none';
    }
    
    // Enter key
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
